<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@700;800&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#090A14',
            primary: '#DF6B33',
            'primary-hover': '#C45C2A',
            surface: '#12141F',
            'surface-2': '#1A1D2E',
            'border-subtle': '#23263A',
            'text-secondary': '#8B8FA8',
          },
          fontFamily: {
            heading: ['Poppins', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    body {
      background-color: #090A14;
    }

    .input-icon {
      color: #8B8FA8;
    }

    .input-field:focus~.input-icon {
      color: #DF6B33;
    }

    .social-btn:hover {
      border-color: #DF6B33;
    }

    .divider-line {
      background-color: #23263A;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center px-4 py-10 font-body text-white">

  <div class="w-full max-w-md">

    <!-- Logo / Brand -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-surface border border-border-subtle mb-4">
        <i data-lucide="layout-dashboard" class="w-7 h-7 text-primary"></i>
      </div>
      <h1 class="font-heading font-extrabold text-3xl tracking-tight">Create Account</h1>
      <p class="text-text-secondary mt-2 text-sm">Join us and get started today</p>
    </div>

    <!-- Card -->
    <div class="bg-surface border border-border-subtle rounded-2xl p-8 shadow-2xl shadow-black/50">

      <form id="registerForm" novalidate>

        <!-- Full Name -->
        <div class="mb-5">
          <label for="fullname" class="block text-sm font-medium mb-2 text-text-secondary">Full Name <span
              class="text-primary">*</span></label>
          <div class="relative">
            <input id="fullname" type="text" placeholder="John Doe"
              class="input-field w-full bg-surface-2 border border-border-subtle rounded-xl px-4 py-3 pl-11 text-sm placeholder-text-secondary focus:outline-none focus:border-primary transition-colors duration-200" />
            <i data-lucide="user"
              class="input-icon absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 transition-colors duration-200"></i>
          </div>
          <p id="fullnameError" class="hidden text-xs text-red-400 mt-1.5">Full name is required.</p>
        </div>

        <!-- Email -->
        <div class="mb-5">
          <label for="email" class="block text-sm font-medium mb-2 text-text-secondary">Email Address <span
              class="text-primary">*</span></label>
          <div class="relative">
            <input id="email" type="email" placeholder="you@example.com"
              class="input-field w-full bg-surface-2 border border-border-subtle rounded-xl px-4 py-3 pl-11 text-sm placeholder-text-secondary focus:outline-none focus:border-primary transition-colors duration-200" />
            <i data-lucide="mail"
              class="input-icon absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 transition-colors duration-200"></i>
          </div>
          <p id="emailError" class="hidden text-xs text-red-400 mt-1.5">Email is required.</p>
        </div>

        <!-- Phone Number -->
        <div class="mb-5">
          <label for="phone" class="block text-sm font-medium mb-2 text-text-secondary">Phone Number</label>
          <div class="relative">
            <input id="phone" type="tel" placeholder="+1 (555) 000-0000"
              class="input-field w-full bg-surface-2 border border-border-subtle rounded-xl px-4 py-3 pl-11 text-sm placeholder-text-secondary focus:outline-none focus:border-primary transition-colors duration-200" />
            <i data-lucide="phone"
              class="input-icon absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 transition-colors duration-200"></i>
          </div>
        </div>

        <!-- Gender -->
        <div class="mb-5">
          <label class="block text-sm font-medium mb-2 text-text-secondary">Gender</label>
          <div class="flex gap-4">
            <label class="flex items-center gap-2 cursor-pointer select-none">
              <input type="radio" name="gender" value="male"
                class="w-4 h-4 border-border-subtle bg-surface-2 accent-primary cursor-pointer">
              <span class="text-sm text-text-secondary">Male</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer select-none">
              <input type="radio" name="gender" value="female"
                class="w-4 h-4 border-border-subtle bg-surface-2 accent-primary cursor-pointer">
              <span class="text-sm text-text-secondary">Female</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer select-none">
              <input type="radio" name="gender" value="other"
                class="w-4 h-4 border-border-subtle bg-surface-2 accent-primary cursor-pointer">
              <span class="text-sm text-text-secondary">Other</span>
            </label>
          </div>
        </div>

        <!-- Address -->
        <div class="mb-5">
          <label for="address" class="block text-sm font-medium mb-2 text-text-secondary">Address</label>
          <div class="relative">
            <textarea id="address" placeholder="123 Main St, City, Country" rows="2"
              class="input-field w-full bg-surface-2 border border-border-subtle rounded-xl px-4 py-3 pl-11 text-sm placeholder-text-secondary focus:outline-none focus:border-primary transition-colors duration-200 resize-none"></textarea>
            <i data-lucide="map-pin" class="input-icon absolute left-3.5 top-3 w-4 h-4 transition-colors duration-200"></i>
          </div>
        </div>

        <!-- Password -->
        <div class="mb-5">
          <label for="password" class="block text-sm font-medium mb-2 text-text-secondary">Password</label>
          <div class="relative">
            <input id="password" type="password" placeholder="Create a strong password"
              class="input-field w-full bg-surface-2 border border-border-subtle rounded-xl px-4 py-3 pl-11 pr-11 text-sm placeholder-text-secondary focus:outline-none focus:border-primary transition-colors duration-200" />
            <i data-lucide="lock-keyhole"
              class="input-icon absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 transition-colors duration-200"></i>
            <button type="button" id="togglePassword"
              class="absolute right-3.5 top-1/2 -translate-y-1/2 text-text-secondary hover:text-white transition-colors duration-200 cursor-pointer">
              <i data-lucide="eye" id="eyeIcon" class="w-4 h-4"></i>
            </button>
          </div>
          <p id="passwordError" class="hidden text-xs text-red-400 mt-1.5">Password is required.</p>
        </div>

        <!-- Confirm Password -->
        <div class="mb-6">
          <label for="confirmPassword" class="block text-sm font-medium mb-2 text-text-secondary">Confirm Password</label>
          <div class="relative">
            <input id="confirmPassword" type="password" placeholder="Confirm your password"
              class="input-field w-full bg-surface-2 border border-border-subtle rounded-xl px-4 py-3 pl-11 pr-11 text-sm placeholder-text-secondary focus:outline-none focus:border-primary transition-colors duration-200" />
            <i data-lucide="lock-keyhole"
              class="input-icon absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 transition-colors duration-200"></i>
            <button type="button" id="toggleConfirmPassword"
              class="absolute right-3.5 top-1/2 -translate-y-1/2 text-text-secondary hover:text-white transition-colors duration-200 cursor-pointer">
              <i data-lucide="eye" id="eyeIconConfirm" class="w-4 h-4"></i>
            </button>
          </div>
          <p id="confirmPasswordError" class="hidden text-xs text-red-400 mt-1.5">Passwords do not match.</p>
        </div>

        <!-- Terms -->
        <div class="flex items-start gap-2.5 mb-8">
          <input type="checkbox" id="terms"
            class="w-4 h-4 rounded border-border-subtle bg-surface-2 accent-primary cursor-pointer mt-0.5">
          <label for="terms" class="text-sm text-text-secondary cursor-pointer">
            I agree to the <a href="#" class="text-primary hover:text-primary-hover transition-colors duration-200">Terms of
              Service</a> and <a href="#" class="text-primary hover:text-primary-hover transition-colors duration-200">Privacy
              Policy</a>
          </label>
        </div>
        <p id="termsError" class="hidden text-xs text-red-400 -mt-4 mb-6">You must agree to the Terms of Service.</p>

        <!-- Submit -->
        <button type="submit" id="submitBtn"
          class="w-full bg-primary hover:bg-primary-hover font-heading font-bold text-base py-3 rounded-xl transition-all duration-200 active:scale-[0.98] cursor-pointer flex items-center justify-center gap-2">
          <span id="submitText">Create Account</span>
          <i data-lucide="loader-2" id="submitSpinner" class="hidden w-5 h-5 animate-spin"></i>
        </button>

      </form>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-8">
        <div class="flex-1 h-px divider-line"></div>
        <span class="text-text-secondary text-xs uppercase tracking-widest">or continue with</span>
        <div class="flex-1 h-px divider-line"></div>
      </div>

      <!-- Social Buttons -->
      <div class="grid grid-cols-3 gap-3">

        <button id="googleBtn"
          class="social-btn flex items-center justify-center gap-2 bg-surface-2 border border-border-subtle rounded-xl py-3 px-2 hover:bg-opacity-80 transition-all duration-200 cursor-pointer">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#fff"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
            <path fill="#fff"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
            <path fill="#fff"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
            <path fill="#fff"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
          </svg>
          <span class="text-xs font-medium hidden sm:inline">Google</span>
        </button>

        <button id="githubBtn"
          class="social-btn flex items-center justify-center gap-2 bg-surface-2 border border-border-subtle rounded-xl py-3 px-2 hover:bg-opacity-80 transition-all duration-200 cursor-pointer">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="#fff">
            <path
              d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z" />
          </svg>
          <span class="text-xs font-medium hidden sm:inline">GitHub</span>
        </button>

        <button id="facebookBtn"
          class="social-btn flex items-center justify-center gap-2 bg-surface-2 border border-border-subtle rounded-xl py-3 px-2 hover:bg-opacity-80 transition-all duration-200 cursor-pointer">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#fff"
              d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
          </svg>
          <span class="text-xs font-medium hidden sm:inline">Facebook</span>
        </button>

      </div>

    </div>

    <!-- Sign In link -->
    <p class="text-center mt-8 text-sm text-text-secondary">
      Already have an account?
      <a href="login-firebase.html"
        class="text-primary hover:text-primary-hover transition-colors duration-200 font-medium">Sign in</a>
    </p>

  </div>

  <script type="module">
    // Firebase imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      updateProfile,
      GoogleAuthProvider,
      GithubAuthProvider,
      FacebookAuthProvider,
      signInWithPopup,
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCdrlo7GejGs8ttAFCa2n3vCcgofeFlH9E",
      authDomain: "claudecode-tutorials.firebaseapp.com",
      projectId: "claudecode-tutorials",
      storageBucket: "claudecode-tutorials.firebasestorage.app",
      messagingSenderId: "653048686540",
      appId: "1:653048686540:web:32d18acf6df549b1419f69",
      measurementId: "G-HHYZVH2J87"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Auth providers
    const googleProvider = new GoogleAuthProvider();
    const githubProvider = new GithubAuthProvider();
    const facebookProvider = new FacebookAuthProvider();

    // Init Lucide icons
    lucide.createIcons();

    // Toggle password visibility
    function setupToggle(toggleBtn, inputEl, iconEl) {
      toggleBtn.addEventListener('click', () => {
        const isPassword = inputEl.type === 'password';
        inputEl.type = isPassword ? 'text' : 'password';
        iconEl.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
        lucide.createIcons();
      });
    }

    setupToggle(
      document.getElementById('togglePassword'),
      document.getElementById('password'),
      document.getElementById('eyeIcon')
    );

    setupToggle(
      document.getElementById('toggleConfirmPassword'),
      document.getElementById('confirmPassword'),
      document.getElementById('eyeIconConfirm')
    );

    // Form elements
    const form = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');
    const submitText = document.getElementById('submitText');
    const submitSpinner = document.getElementById('submitSpinner');

    const fullnameInput = document.getElementById('fullname');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const termsCheckbox = document.getElementById('terms');

    const fullnameError = document.getElementById('fullnameError');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const confirmPasswordError = document.getElementById('confirmPasswordError');
    const termsError = document.getElementById('termsError');

    function setError(input, errorEl, show, msg) {
      if (show) {
        errorEl.classList.remove('hidden');
        if (msg) errorEl.textContent = msg;
        input.classList.add('border-red-400');
      } else {
        errorEl.classList.add('hidden');
        input.classList.remove('border-red-400');
      }
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      submitBtn.classList.toggle('opacity-60', loading);
      submitText.textContent = loading ? 'Creating Account...' : 'Create Account';
      submitSpinner.classList.toggle('hidden', !loading);
    }

    function setSocialLoading(btn, loading) {
      btn.disabled = loading;
      btn.classList.toggle('opacity-60', loading);
    }

    // Firebase Auth Error messages
    function getFirebaseError(errorCode) {
      const errors = {
        'auth/email-already-in-use': 'This email is already registered. Try signing in.',
        'auth/invalid-email': 'Invalid email address format.',
        'auth/weak-password': 'Password should be at least 6 characters.',
        'auth/operation-not-allowed': 'Email/password sign-up is not enabled. Check Firebase console.',
        'auth/network-request-failed': 'Network error. Check your connection.',
        'auth/too-many-requests': 'Too many attempts. Please try again later.',
        'auth/popup-closed-by-user': 'Sign-in popup was closed.',
        'auth/account-exists-with-different-credential': 'An account already exists with this email using a different sign-in method.',
        'auth/invalid-credential': 'Invalid credentials. Please check and try again.',
      };
      return errors[errorCode] || 'Something went wrong. Please try again.';
    }

    // Form validation
    function validateForm() {
      let valid = true;
      const emailVal = emailInput.value.trim();
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!fullnameInput.value.trim()) {
        setError(fullnameInput, fullnameError, true);
        valid = false;
      } else {
        setError(fullnameInput, fullnameError, false);
      }

      if (!emailVal) {
        setError(emailInput, emailError, true, 'Email is required.');
        valid = false;
      } else if (!emailRegex.test(emailVal)) {
        setError(emailInput, emailError, true, 'Please enter a valid email address.');
        valid = false;
      } else {
        setError(emailInput, emailError, false);
      }

      if (!passwordInput.value.trim()) {
        setError(passwordInput, passwordError, true, 'Password is required.');
        valid = false;
      } else if (passwordInput.value.length < 6) {
        setError(passwordInput, passwordError, true, 'Password must be at least 6 characters.');
        valid = false;
      } else {
        setError(passwordInput, passwordError, false);
      }

      if (!confirmPasswordInput.value.trim()) {
        setError(confirmPasswordInput, confirmPasswordError, true, 'Please confirm your password.');
        valid = false;
      } else if (passwordInput.value.trim() !== confirmPasswordInput.value.trim()) {
        setError(confirmPasswordInput, confirmPasswordError, true, 'Passwords do not match.');
        valid = false;
      } else {
        setError(confirmPasswordInput, confirmPasswordError, false);
      }

      if (!termsCheckbox.checked) {
        termsError.classList.remove('hidden');
        valid = false;
      } else {
        termsError.classList.add('hidden');
      }

      return valid;
    }

    // Clear error on input
    [fullnameInput, emailInput, passwordInput, confirmPasswordInput].forEach(input => {
      input.addEventListener('input', () => {
        input.classList.remove('border-red-400');
      });
    });
    fullnameInput.addEventListener('input', () => fullnameError.classList.add('hidden'));
    emailInput.addEventListener('input', () => emailError.classList.add('hidden'));
    passwordInput.addEventListener('input', () => passwordError.classList.add('hidden'));
    confirmPasswordInput.addEventListener('input', () => confirmPasswordError.classList.add('hidden'));
    termsCheckbox.addEventListener('change', () => {
      if (termsCheckbox.checked) termsError.classList.add('hidden');
    });

    // Email/Password registration
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!validateForm()) return;

      setLoading(true);
      try {
        const userCredential = await createUserWithEmailAndPassword(
          auth,
          emailInput.value.trim(),
          passwordInput.value
        );

        await updateProfile(userCredential.user, {
          displayName: fullnameInput.value.trim(),
        });

        console.log('Firebase user created:', userCredential.user);
        alert(`Account created successfully!\nWelcome, ${fullnameInput.value.trim()}`);
        window.location.href = 'login.html';
      } catch (error) {
        console.error('Firebase Auth error:', error.code, error.message);
        const msg = getFirebaseError(error.code);
        if (error.code === 'auth/email-already-in-use') {
          setError(emailInput, emailError, true, msg);
        } else if (error.code === 'auth/weak-password') {
          setError(passwordInput, passwordError, true, msg);
        } else if (error.code === 'auth/invalid-email') {
          setError(emailInput, emailError, true, msg);
        } else {
          alert(msg);
        }
      } finally {
        setLoading(false);
      }
    });

    // Social login handlers
    async function handleSocialLogin(provider, providerName) {
      try {
        const result = await signInWithPopup(auth, provider);
        console.log(`${providerName} login success:`, result.user);
        alert(`Welcome, ${result.user.displayName || result.user.email}!`);
        window.location.href = 'login.html';
      } catch (error) {
        console.error(`${providerName} login error:`, error.code, error.message);
        if (error.code !== 'auth/popup-closed-by-user') {
          alert(getFirebaseError(error.code));
        }
      }
    }

    document.getElementById('googleBtn').addEventListener('click', () => {
      handleSocialLogin(googleProvider, 'Google');
    });

    document.getElementById('githubBtn').addEventListener('click', () => {
      handleSocialLogin(githubProvider, 'GitHub');
    });

    document.getElementById('facebookBtn').addEventListener('click', () => {
      handleSocialLogin(facebookProvider, 'Facebook');
    });
  </script>

</body>

</html>
